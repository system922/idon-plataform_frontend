<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <!-- ============================================ -->
    <!-- FAVICON - Logo en la pestaña del navegador   -->
    <!-- ============================================ -->
    <!-- ✅ Usando IDON_2.svg para la pestaña -->
    <link rel="icon" href="%PUBLIC_URL%/IDON_2.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/IDON_2.svg" />
    
    <!-- Fallback para navegadores que no soportan SVG -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/IDON_2.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/IDON_2.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme -->
    <meta name="theme-color" content="#07101a" />

    <!-- SEO -->
    <title>IDON | Gestión Multinegocios</title>
    <meta
      name="description"
      content="IDON es una plataforma de gestión multinegocios diseñada para restaurantes, comercios y empresas. Controla operaciones, ventas, inventario y más desde un solo sistema."
    />
    <meta
      name="keywords"
      content="IDON - Plataforma de Gestión Multinegocios, sistema de gestión, multinegocio, restaurantes, inventario, ventas, software empresarial"
    />
    <meta name="author" content="IDON" />

    <!-- ============================================ -->
    <!-- OPEN GRAPH (Facebook, WhatsApp, LinkedIn)    -->
    <!-- ============================================ -->
    <meta property="og:title" content="IDON - Plataforma de Gestión Multinegocio" />
    <meta
      property="og:description"
      content="Administra múltiples negocios en un solo lugar con IDON. Solución moderna, escalable y eficiente."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.idonplataform.site/" />
    <meta property="og:site_name" content="IDON" />
    <meta property="og:locale" content="es_ES" />

    <!-- ✅ IMAGEN PARA REDES SOCIALES - Usar PNG (mejor compatibilidad) -->
    <!-- Asegúrate de tener el archivo IDON_3.png en la carpeta public -->
    <meta property="og:image" content="https://www.idonplataform.site/IDON_3.png" />
    <meta property="og:image:secure_url" content="https://www.idonplataform.site/IDON_3.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="IDON - Plataforma de Gestión Multinegocio" />

    <!-- Fallback: si no encuentra PNG, usar SVG -->
    <meta property="og:image" content="https://www.idonplataform.site/IDON_2.svg" />
    <meta property="og:image:secure_url" content="https://www.idonplataform.site/IDON_2.svg" />
    <meta property="og:image:type" content="image/svg+xml" />

    <!-- ============================================ -->
    <!-- TWITTER CARDS (Twitter/X)                    -->
    <!-- ============================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IDON - Plataforma de Gestión Multinegocio" />
    <meta
      name="twitter:description"
      content="Administra múltiples negocios en un solo lugar con IDON. Solución moderna, escalable y eficiente."
    />
    <meta name="twitter:image" content="https://www.idonplataform.site/IDON_3.png" />
    <meta name="twitter:image:alt" content="IDON Logo" />
    <meta name="twitter:site" content="@IDON" />

    <!-- ============================================ -->
    <!-- METADATOS ADICIONALES                        -->
    <!-- ============================================ -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://www.idonplataform.site/" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Tipografía -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #07101a;
        color: #ffffff;
      }
    </style>
  </head>

  <body>
    <noscript>
      IDON Plataform requiere JavaScript para funcionar correctamente. Por favor, actívalo en tu navegador.
    </noscript>

    <div id="root"></div>

    -->
  </body>
</html>
